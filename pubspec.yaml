name: match_pro
description: MatchPro - AI Real Estate Matching Platform by Crystal Power Investments
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # HTTP & Networking
  http: 1.5.0
  socket_io_client: 2.0.3+1

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # URL launcher (WhatsApp links, phone calls)
  url_launcher: ^6.3.1

  # Charts
  fl_chart: ^0.69.0

  # Intl / date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
